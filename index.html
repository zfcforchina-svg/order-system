        function applyFilter(platform) {
            // ===== 条件1 =====
            var colName1 = document.getElementById('col-' + platform).value;
            var keyword1 = document.getElementById('key-' + platform).value.trim();
            // ===== 条件2 =====
            var colName2 = document.getElementById('col2-' + platform).value;
            var keyword2 = document.getElementById('key2-' + platform).value.trim();
            // ===== 条件3 =====
            var colName3 = document.getElementById('col3-' + platform).value;
            var keyword3 = document.getElementById('key3-' + platform).value.trim();

            var data = dataStore[platform].allData;
            if (!data || data.length === 0) return;

            // 交集（AND）筛选：同时满足条件1、条件2、条件3
            var filtered = data;
            if (keyword1 !== '') {
                filtered = filtered.filter(function(row) {
                    var val = row[colName1];
                    return val !== undefined && val !== null && String(val).indexOf(keyword1) !== -1;
                });
            }
            if (keyword2 !== '') {
                filtered = filtered.filter(function(row) {
                    var val = row[colName2];
                    return val !== undefined && val !== null && String(val).indexOf(keyword2) !== -1;
                });
            }
            if (keyword3 !== '') {
                filtered = filtered.filter(function(row) {
                    var val = row[colName3];
                    return val !== undefined && val !== null && String(val).indexOf(keyword3) !== -1;
                });
            }
            dataStore[platform].filteredData = filtered;

            // Determine display columns
            var displayCols = [];
            var pCfg = PLATFORMS.find(function(x) { return x.id === platform; }).config;
            if (platform === 'jd') {
                displayCols = pCfg.keepCols.filter(function(c) { return dataStore[platform].headers.indexOf(c) !== -1; });
            } else if (platform === 'pdd') {
                displayCols = pCfg.keepCols.filter(function(c) { return dataStore[platform].headers.indexOf(c) !== -1; });
            } else {
                displayCols = pCfg.keepCols.filter(function(c) {
                    if (c === '购买数量') {
                        return pCfg.qtyAlias.some(function(alias) { return dataStore[platform].headers.indexOf(alias) !== -1; });
                    }
                    return dataStore[platform].headers.indexOf(c) !== -1;
                });
            }
            if (displayCols.length === 0) displayCols = dataStore[platform].headers;

            // Render table
            var theadHtml = '<tr>';
            displayCols.forEach(function(col) { theadHtml += '<th>' + col + '</th>'; });
            theadHtml += '</tr>';
            document.getElementById('head-' + platform).innerHTML = theadHtml;

            var tbodyHtml = '';
            var limit = Math.min(filtered.length, 50);
            for (var i = 0; i < limit; i++) {
                tbodyHtml += '<tr>';
                displayCols.forEach(function(col) { var val = filtered[i][col] || ''; tbodyHtml += '<td title="' + val + '">' + val + '</td>'; });
                tbodyHtml += '</tr>';
            }
            if (filtered.length > 50) tbodyHtml += '<tr><td colspan="' + displayCols.length + '" style="text-align:center;color:#4a6a7a;padding:6px;">... 预览前50条，共 ' + filtered.length + ' 条 ...</td></tr>';
            else if (filtered.length === 0) tbodyHtml = '<tr><td colspan="' + displayCols.length + '" class="empty-state" style="padding:12px 0;"><span class="empty-icon">🔍</span>无匹配记录</td></tr>';
            document.getElementById('body-' + platform).innerHTML = tbodyHtml;
            document.getElementById('dl-' + platform).disabled = (filtered.length === 0);

            // 先更新全平台汇总 → 再自动分流到备货模块
            console.log('[applyFilter] platform=' + platform + ' filtered=' + filtered.length + ' allData=' + data.length);
            updateSummary();
            distributeOrdersToModules();
        }

        // ==========================================================
        // Auto-distribute: 使用和 updateSummary 完全相同的 mapRules，
        // 从全平台统一汇总的数据源（filteredData）提取前三列 → 注入 Module1
        // ==========================================================
        var mapRules = {
            tmallA: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫A' },
            tmallB: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫B' },
            pdd: { orderId: '订单号', attr: '商品规格', qty: '商品数量(件)', label: '拼多多' },
            jd: { orderId: '订单号', attr: '商品属性', qty: '订购数量', label: '京东' }
        };
        var noteAliases = ['商家备注', '备注', '订单备注'];

        function distributeOrdersToModules() {
            orderDatas.New = []; orderDatas.Old = [];

            // === summaryData 就是全平台统一汇总表的前三列 + 备注 ===
            // 由 updateSummary() 填充，与页面上显示的汇总表完全一致

            // === 检测筛选器输入是否含"新"或"旧" ===
            var filterTargetsNew = false;
            var filterTargetsOld = false;
            PLATFORMS.forEach(function(p) {
                var k1 = document.getElementById('key-' + p.id);
                var k2 = document.getElementById('key2-' + p.id);
                var k3 = document.getElementById('key3-' + p.id);
                var all = (k1 ? k1.value : '') + (k2 ? k2.value : '') + (k3 ? k3.value : '');
                if (all.indexOf('新') !== -1) filterTargetsNew = true;
                if (all.indexOf('旧') !== -1) filterTargetsOld = true;
            });

            // === 映射表文件名条件 ===
            var mappingHasNew = mappingFileNames['New'] !== '' && mappingFileNames['New'].indexOf('新') !== -1;
            var mappingHasOld = mappingFileNames['Old'] !== '' && mappingFileNames['Old'].indexOf('旧') !== -1;

            console.log('[distribute] summaryData=' + summaryData.length + ' filterNew=' + filterTargetsNew + ' filterOld=' + filterTargetsOld + ' mapNew=' + mappingHasNew + ' mapOld=' + mappingHasOld);

            // === 核心路由逻辑 ===
            // 策略：如果筛选器已经输入了"新"/"旧"，就信任筛选结果
            // 筛选器含"新" + 映射文件名含"新" → 全部汇入新款
            // 筛选器含"旧" + 映射文件名含"旧" → 全部汇入旧款
            // 否则回退到备注内容判断

            var routeToNew = (filterTargetsNew && mappingHasNew);
            var routeToOld = (filterTargetsOld && mappingHasOld);

            summaryData.forEach(function(item) {
                var note = item.note || '';
                var orderEntry = {
                    '收件人信息': item['主订单编号'],
                    'sku名称': item['商品属性'],
                    '购买数量': parseQty(item['购买数量'])
                };

                if (routeToNew) {
                    // 筛选器明确筛选"新" → 全部汇入新款
                    orderDatas.New.push(orderEntry);
                } else if (routeToOld) {
                    // 筛选器明确筛选"旧" → 全部汇入旧款
                    orderDatas.Old.push(orderEntry);
                } else if (note.indexOf('旧') !== -1) {
                    orderDatas.Old.push(orderEntry);
                } else if (note.indexOf('新') !== -1) {
                    orderDatas.New.push(orderEntry);
                }
                // 不含新/旧的不汇入
            });

            console.log('[distribute] 路由结果 New=' + orderDatas.New.length + ' Old=' + orderDatas.Old.length);

            triggerAutoGenerate('New');
            triggerAutoGenerate('Old');
        }

        // 条件满足时直接触发生成
        function triggerAutoGenerate(type) {
            var label = type === 'New' ? '新款' : '旧款';
            var char = type === 'New' ? '新' : '旧';
            var oi = document.getElementById('orderInfo' + type);
            var xlsxOk = typeof XLSX !== 'undefined';
            var hasData = orderDatas[type].length > 0;
            var hasMapping = Object.keys(skuMappings[type]).length > 0;
            var mappingNameOk = mappingFileNames[type] !== '' && mappingFileNames[type].indexOf(char) !== -1;

            console.log('[trigger] type=' + type + ' hasData=' + hasData + ' hasMapping=' + hasMapping + ' mappingNameOk=' + mappingNameOk + ' xlsxOk=' + xlsxOk);

            if (hasData && hasMapping && xlsxOk) {
                oi.innerHTML = '✅ 汇总前三列汇入 ' + orderDatas[type].length + ' 条';
                oi.className = 'm1-file-status';
                document.getElementById('m1Status' + type).innerHTML = '✅ 条件满足（筛选含"' + char + '" + 映射含"' + char + '"）→ 全平台汇总前三列自动汇入，生成备货单';
                document.getElementById('m1Status' + type).className = 'm1-status success';
                document.getElementById('exportBtn' + type).disabled = false;
                document.getElementById('exportMergedBtn').disabled = false;
                document.getElementById('processBtn' + type).style.display = 'none';
                document.getElementById('regenBtn' + type).style.display = 'inline-flex';
                document.getElementById('regenBtn' + type).disabled = false;
                m1AutoGenerated[type] = true;
                generatePickingList(type);
            } else if (hasData && !hasMapping) {
                oi.innerHTML = '✅ 汇总前三列就绪 ' + orderDatas[type].length + ' 条';
                oi.className = 'm1-file-status';
                var hint = mappingNameOk ? '' : '（建议文件名含"' + char + '"）';
                document.getElementById('m1Status' + type).innerHTML = '⏳ 全平台汇总已就绪 ' + orderDatas[type].length + ' 条，请上传' + label + 'SKU映射表' + hint;
                document.getElementById('m1Status' + type).className = 'm1-status info';
            } else if (!hasData) {
                oi.textContent = '等待全平台汇总汇入...';
                oi.className = 'm1-file-status empty';
            }
        }

        // ==========================================================
        // Clear functions — 删除已上传文件
        // ==========================================================
        function clearMapping(type) {
            var fileInput = document.getElementById('mappingFile' + type);
            var statusEl = document.getElementById('mappingInfo' + type);
            fileInput.value = '';
            statusEl.textContent = '未上传';
            statusEl.className = 'm1-file-status empty';
            skuMappings[type] = {};
            mappingFileNames[type] = '';
            m1AutoGenerated[type] = false;
            document.getElementById('processBtn' + type).style.display = 'inline-flex';
            document.getElementById('regenBtn' + type).style.display = 'none';
            document.getElementById('exportBtn' + type).disabled = true;
            document.getElementById('pivotTable' + type).innerHTML = '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-title">生成' + (type === 'New' ? '新款' : '旧款') + '备货单</div><div class="empty-hint">上传映射表 + 汇总数据后自动生成</div></div>';
            document.getElementById('m1Status' + type).innerHTML = '';
            document.getElementById('m1Status' + type).className = 'm1-status';
            showToast('已清除' + (type === 'New' ? '新款' : '旧款') + '映射表', 'info');
            triggerAutoGenerate(type);
        }

        function clearOrderData(type) {
            var fileInput = document.getElementById('orderFile' + type);
            var statusEl = document.getElementById('orderInfo' + type);
            fileInput.value = '';
            orderDatas[type] = [];
            statusEl.textContent = '等待汇总数据汇入...';
            statusEl.className = 'm1-file-status empty';
            m1AutoGenerated[type] = false;
            document.getElementById('processBtn' + type).style.display = 'inline-flex';
            document.getElementById('regenBtn' + type).style.display = 'none';
            document.getElementById('exportBtn' + type).disabled = true;
            document.getElementById('pivotTable' + type).innerHTML = '<div class="empty-state"><span class="empty-icon">📊</span><div class="empty-title">生成' + (type === 'New' ? '新款' : '旧款') + '备货单</div><div class="empty-hint">上传映射表 + 汇总数据后自动生成</div></div>';
            document.getElementById('m1Status' + type).innerHTML = '';
            document.getElementById('m1Status' + type).className = 'm1-status';
            showToast('已清除' + (type === 'New' ? '新款' : '旧款') + '订单数据', 'info');
            triggerAutoGenerate(type);
        }

        function clearPlatform(platform) {
            var fileInput = document.getElementById('file-' + platform);
            fileInput.value = '';
            dataStore[platform] = { allData: [], headers: [], filteredData: [] };
            document.getElementById('status-' + platform).innerHTML = '等待上传...';
            document.getElementById('head-' + platform).innerHTML = '';
            document.getElementById('body-' + platform).innerHTML = '<tr><td class="empty-state" style="padding:20px 0;"><span class="empty-icon">📂</span>请上传文件</td></tr>';
            document.getElementById('dl-' + platform).disabled = true;
            // 清空三个下拉框
            ['col-', 'col2-', 'col3-'].forEach(function(prefix) {
                var sel = document.getElementById(prefix + platform);
                if (sel) sel.innerHTML = '';
            });
            // 清空三个关键词框
            ['key-', 'key2-', 'key3-'].forEach(function(prefix) {
                var inp = document.getElementById(prefix + platform);
                if (inp) inp.value = '';
            });
            showToast('已清除' + (PLATFORMS.find(function(x) { return x.id === platform; }) || {}).name || platform, 'info');
            updateSummary();
            distributeOrdersToModules();
        }

        // ==========================================================
        // Price helper for summary
        // ==========================================================
        function getPrice(row, aliases) {
            for (var i = 0; i < aliases.length; i++) {
                var val = row[aliases[i]];
                if (val !== undefined && val !== null && val !== '') return val;
            }
            return '';
        }

        // ==========================================================
        // 全局汇总数据（updateSummary 填充，distributeOrdersToModules 消费）
        // ==========================================================
        var summaryData = []; // [{ 主订单编号, 商品属性, 购买数量, note }]

        // ==========================================================
        // Update summary table
        // ==========================================================
        function updateSummary() {
            var allMergedItems = [];
            summaryData = []; // 重置
            var mapRulesLocal = {
                tmallA: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫A' },
                tmallB: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫B' },
                pdd: { orderId: '订单号', attr: '商品规格', qty: '商品数量(件)', label: '拼多多' },
                jd: { orderId: '订单号', attr: '商品属性', qty: '订购数量', label: '京东' }
            };

            PLATFORMS.forEach(function(p) {
                var rows = dataStore[p.id].filteredData;
                if (!rows || rows.length === 0) return;
                var cfg = PLATFORMS.find(function(x) { return x.id === p.id; }).config;
                var map = mapRulesLocal[p.id];
                rows.forEach(function(row) {
                    var price = getPrice(row, cfg.priceAlias);
                    var oid = row[map.orderId] || '';
                    var atr = row[map.attr] || '';
                    var qty = row[map.qty] || '';
                    allMergedItems.push({
                        '主订单编号': oid,
                        '商品属性': atr,
                        '购买数量': qty,
                        '来源平台': map.label,
                        '对应订单金额': price
                    });
                    // 同步保存汇总前三列+备注，供 distributeOrdersToModules 消费
                    var rowNote = '';
                    for (var ni2 = 0; ni2 < noteAliases.length; ni2++) {
                        if (row[noteAliases[ni2]] !== undefined) { rowNote = String(row[noteAliases[ni2]] || '').trim(); break; }
                    }
                    summaryData.push({
                        '主订单编号': oid,
                        '商品属性': atr,
                        '购买数量': qty,
                        'note': rowNote
                    });
                });
            });

            console.log('[updateSummary] allMergedItems=' + allMergedItems.length + ' summaryData=' + summaryData.length);

            if (allMergedItems.length > 0) {
                document.getElementById('summaryCount').innerText = '共 ' + allMergedItems.length + ' 条';
                document.getElementById('summaryDownloadBtn').disabled = false;
                document.getElementById('summaryTop3Btn').disabled = false;
                var headers = ['主订单编号', '商品属性', '购买数量', '来源平台', '对应订单金额'];
                var sumHeadHtml = '<tr>'; headers.forEach(function(col) { sumHeadHtml += '<th>' + col + '</th>'; }); sumHeadHtml += '</tr>';
                document.getElementById('summaryHead').innerHTML = sumHeadHtml;
                var sumBodyHtml = '';
                var limit = Math.min(allMergedItems.length, 100);
                for (var i = 0; i < limit; i++) {
                    sumBodyHtml += '<tr>';
                    headers.forEach(function(col) { var val = allMergedItems[i][col] || ''; sumBodyHtml += '<td title="' + val + '">' + val + '</td>'; });
                    sumBodyHtml += '</tr>';
                }
                if (allMergedItems.length > 100) sumBodyHtml += '<tr><td colspan="5" style="text-align:center;color:#4a6a7a;padding:6px;">... 预览前100条，共 ' + allMergedItems.length + ' 条 ...</td></tr>';
                document.getElementById('summaryBody').innerHTML = sumBodyHtml;
                setupScrollIndicator(document.getElementById('summaryScroll'));
            } else {
                document.getElementById('summaryCount').innerText = '共 0 条';
                document.getElementById('summaryDownloadBtn').disabled = true;
                document.getElementById('summaryTop3Btn').disabled = true;
                document.getElementById('summaryHead').innerHTML = '';
                document.getElementById('summaryBody').innerHTML = '<tr><td colspan="5" class="empty-state"><span class="empty-icon">📋</span><div class="empty-title">暂无汇总数据</div><div class="empty-hint">请上传并筛选任一平台订单数据</div></td></tr>';
            }
        }

        // ==========================================================
        // Module 2: Download filtered results
        // ==========================================================
        function downloadFile(platform) {
            var keyword = document.getElementById('key-' + platform).value.trim();
            var filtered = dataStore[platform].filteredData;
            if (!filtered || filtered.length === 0) { showToast('无数据可下载', 'warning'); return; }

            var downloadCols = [];
            var pCfg = PLATFORMS.find(function(x) { return x.id === platform; }).config;
            if (platform === 'jd') {
                downloadCols = pCfg.keepCols.filter(function(c) { return dataStore[platform].headers.indexOf(c) !== -1; });
            } else if (platform === 'pdd') {
                downloadCols = pCfg.keepCols.filter(function(c) { return dataStore[platform].headers.indexOf(c) !== -1; });
            } else {
                downloadCols = pCfg.keepCols.filter(function(c) {
                    if (c === '购买数量') {
                        return pCfg.qtyAlias.some(function(alias) { return dataStore[platform].headers.indexOf(alias) !== -1; });
                    }
                    return dataStore[platform].headers.indexOf(c) !== -1;
                });
            }
            if (downloadCols.length === 0) downloadCols = dataStore[platform].headers;

            var downloadData = filtered.map(function(row) {
                var newRow = {};
                downloadCols.forEach(function(col) { newRow[col] = row[col] !== undefined ? row[col] : ''; });
                return newRow;
            });
            var ws = XLSX.utils.json_to_sheet(downloadData);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '结果');
            ws['!cols'] = downloadCols.map(function() { return { wch: 18 }; });
            var name = PLATFORMS.find(function(x) { return x.id === platform; }).name;
            XLSX.writeFile(wb, name + '_筛选结果_' + (keyword || '全部') + '.xlsx');
            showToast(name + ' 筛选结果导出成功', 'success');
        }

        // ==========================================================
        // Module 2: Download summary
        // ==========================================================
        function downloadSummary(type) {
            var allMergedItems = [];
            var mapRules = {
                tmallA: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫A' },
                tmallB: { orderId: '主订单编号', attr: '商品属性', qty: '购买数量', label: '天猫B' },
                pdd: { orderId: '订单号', attr: '商品规格', qty: '商品数量(件)', label: '拼多多' },
                jd: { orderId: '订单号', attr: '商品属性', qty: '订购数量', label: '京东' }
            };

            PLATFORMS.forEach(function(p) {
                var rows = dataStore[p.id].filteredData;
                if (!rows || rows.length === 0) return;
                var cfg = PLATFORMS.find(function(x) { return x.id === p.id; }).config;
                var map = mapRules[p.id];
                rows.forEach(function(row) {
                    var price = getPrice(row, cfg.priceAlias);
                    allMergedItems.push({
                        '主订单编号': row[map.orderId] || '',
                        '商品属性': row[map.attr] || '',
                        '购买数量': row[map.qty] || '',
                        '来源平台': map.label,
                        '对应订单金额': price
                    });
                });
            });

            if (allMergedItems.length === 0) { showToast('当前无汇总数据可下载', 'warning'); return; }

            var dataToExport = allMergedItems;
            var headers = ['主订单编号', '商品属性', '购买数量', '来源平台', '对应订单金额'];
            if (type === 'top3') {
                dataToExport = allMergedItems.map(function(item) {
                    return { '主订单编号': item['主订单编号'], '商品属性': item['商品属性'], '购买数量': item['购买数量'] };
                });
                headers = ['主订单编号', '商品属性', '购买数量'];
            }
            var ws = XLSX.utils.json_to_sheet(dataToExport);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '统一汇总');
            ws['!cols'] = headers.map(function() { return { wch: 22 }; });
            var suffix = type === 'top3' ? '前三列数据' : '完整汇总';
            XLSX.writeFile(wb, '全平台统一订单_' + suffix + '.xlsx');
            showToast('全平台汇总导出成功', 'success');
        }

        // ==========================================================
        // Initialize Module 2 cards
        // ==========================================================
        renderModule2Cards();
    </script>
</body>
